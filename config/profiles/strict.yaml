# Profile: strict
# Goal: harden public exposure as much as possible.
# Note: Uploads still depend on Immich shared-link allowUpload.

immich:
  url: "http://immich:2283"

proxy:
  port: 3000
  public_url: "https://photos.example.com"

options:
  allow_download: false
  show_metadata: false
  cache_ttl: 3600

security:
  rate_limit: 600
  password_rate_limit: 3
  max_upload_size: 25
  allowed_origins:
    - "https://photos.example.com"
  enable_hsts: true
  cookie_secret: "replace-with-openssl-rand-hex-32"
  hotlink_protection: true
  trust_proxy_headers: true
  force_secure_cookies: true
  max_concurrent_download_jobs: 1
